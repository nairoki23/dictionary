name: Build Dictionary

on:
  push:
    paths:
      - "dict/public/**"
      - "convert.py"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: :contentReference[oaicite:0]{index=0}@v4

      - uses: :contentReference[oaicite:1]{index=1}@v5
        with:
          python-version: "3.11"

      - run: python convert.py --no-private

      - name: Commit build
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f dict/build/
          git commit -m "auto build" || echo "no changes"
          git push